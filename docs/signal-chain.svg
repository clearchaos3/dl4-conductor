<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1480" width="1600" height="1480">
<defs>
  <style>
    text{font-family:Helvetica,Arial,sans-serif}
    .title{font-size:30px;font-weight:bold;fill:#7CF08A}
    .panel{font-size:22px;font-weight:bold;fill:#9fb0a5;letter-spacing:3px}
    .bt{font-size:19px;font-weight:bold;fill:#e8efe9}
    .bt2{font-size:15px;font-weight:bold;fill:#e8efe9}
    .bs{font-size:14px;fill:#9fb0a5}
    .lbl{font-size:13px;fill:#c8d2cc}
    .clk{font-size:13px;fill:#e0a94a}
    .audio{fill:#16211b;stroke:#5bbf73;stroke-width:2}
    .dl4{fill:#16291d;stroke:#7CF08A;stroke-width:2.5}
    .midi{fill:#15212b;stroke:#5aa0e0;stroke-width:2}
    .out{fill:#241a16;stroke:#d98a5b;stroke-width:2}
    .a{stroke:#c8d2cc;stroke-width:2;fill:none}
    .c{stroke:#e0a94a;stroke-width:2;stroke-dasharray:6 5;fill:none}
  </style>
  <marker id="arr" markerUnits="userSpaceOnUse" markerWidth="13" markerHeight="13" refX="10" refY="4.5" orient="auto">
    <path d="M0,0 L11,4.5 L0,9 Z" fill="#c8d2cc"/>
  </marker>
  <marker id="arrc" markerUnits="userSpaceOnUse" markerWidth="13" markerHeight="13" refX="10" refY="4.5" orient="auto">
    <path d="M0,0 L11,4.5 L0,9 Z" fill="#e0a94a"/>
  </marker>
</defs>

<rect x="0" y="0" width="1600" height="1480" fill="#0d0f0e"/>
<text class="title" x="60" y="58">DL4 ×4  ·  Loop + Lofi-Beat Rig — Signal Chain</text>

<!-- Legend -->
<rect x="1150" y="95" width="380" height="160" rx="10" fill="#11141a" stroke="#444"/>
<text class="bt" x="1172" y="126">Legend</text>
<line x1="1172" y1="152" x2="1222" y2="152" stroke="#5bbf73" stroke-width="3"/>
<text class="bs" x="1236" y="157">audio signal</text>
<line x1="1172" y1="184" x2="1222" y2="184" stroke="#5aa0e0" stroke-width="3"/>
<text class="bs" x="1236" y="189">MIDI control</text>
<line x1="1172" y1="216" x2="1222" y2="216" stroke="#e0a94a" stroke-width="3" stroke-dasharray="6 5"/>
<text class="bs" x="1236" y="221">MIDI clock (tempo)</text>

<!-- ===================== PANEL A: AUDIO ===================== -->
<text class="panel" x="60" y="110">AUDIO  PATH</text>

<rect class="audio" x="110" y="130" width="210" height="58" rx="10"/>
<text class="bt" x="215" y="165" text-anchor="middle">ELECTRIC GUITAR</text>

<line class="a" x1="215" y1="188" x2="215" y2="222" marker-end="url(#arr)"/>

<rect class="audio" x="110" y="226" width="900" height="92" rx="10"/>
<text class="bt" x="560" y="262" text-anchor="middle">TONE FRONT-END  ·  in series</text>
<text class="bs" x="560" y="291" text-anchor="middle">Tuner → Drive/Fuzz → GE-7 EQ → Pitch Fork → Phaser → Delay / Echo → Reverb</text>

<line class="a" x1="560" y1="318" x2="560" y2="352" marker-end="url(#arr)"/>

<rect class="audio" x="460" y="356" width="200" height="50" rx="10"/>
<text class="bt" x="560" y="387" text-anchor="middle">SPLITTER</text>

<line class="a" x1="540" y1="406" x2="255" y2="466" marker-end="url(#arr)"/>
<line class="a" x1="552" y1="406" x2="458" y2="466" marker-end="url(#arr)"/>
<line class="a" x1="568" y1="406" x2="662" y2="466" marker-end="url(#arr)"/>
<line class="a" x1="580" y1="406" x2="865" y2="466" marker-end="url(#arr)"/>

<rect class="dl4" x="170" y="470" width="150" height="76" rx="10"/>
<text class="bt" x="245" y="506" text-anchor="middle">DL4 MkII A</text>
<text class="bs" x="245" y="528" text-anchor="middle">looper</text>
<rect class="dl4" x="380" y="470" width="150" height="76" rx="10"/>
<text class="bt" x="455" y="506" text-anchor="middle">DL4 MkII B</text>
<text class="bs" x="455" y="528" text-anchor="middle">looper</text>
<rect class="dl4" x="590" y="470" width="150" height="76" rx="10"/>
<text class="bt" x="665" y="506" text-anchor="middle">DL4 MkII C</text>
<text class="bs" x="665" y="528" text-anchor="middle">looper</text>
<rect class="dl4" x="800" y="470" width="150" height="76" rx="10"/>
<text class="bt" x="875" y="506" text-anchor="middle">DL4 MkII D</text>
<text class="bs" x="875" y="528" text-anchor="middle">looper</text>

<line class="a" x1="245" y1="546" x2="440" y2="602" marker-end="url(#arr)"/>
<line class="a" x1="455" y1="546" x2="505" y2="602" marker-end="url(#arr)"/>
<line class="a" x1="665" y1="546" x2="618" y2="602" marker-end="url(#arr)"/>
<line class="a" x1="875" y1="546" x2="685" y2="602" marker-end="url(#arr)"/>

<rect class="audio" x="360" y="606" width="400" height="60" rx="10"/>
<text class="bt" x="560" y="634" text-anchor="middle">LINE MIXER</text>
<text class="bs" x="560" y="655" text-anchor="middle">sum 4 DL4s → stereo</text>

<line class="a" x1="560" y1="666" x2="560" y2="698" marker-end="url(#arr)"/>

<rect class="audio" x="110" y="702" width="190" height="70" rx="10"/>
<text class="bt" x="205" y="732" text-anchor="middle">ACOUSTIC</text>
<text class="bs" x="205" y="754" text-anchor="middle">DI input</text>
<line class="a" x1="300" y1="737" x2="356" y2="737" marker-end="url(#arr)"/>

<rect class="audio" x="360" y="702" width="400" height="70" rx="10"/>
<text class="bt" x="560" y="732" text-anchor="middle">APOLLO TWIN</text>
<text class="bs" x="560" y="754" text-anchor="middle">interface · monitoring</text>
<text class="bs" x="772" y="742" text-anchor="start">⇄ Mac (Thunderbolt)</text>

<line class="a" x1="560" y1="772" x2="560" y2="804" marker-end="url(#arr)"/>

<rect class="out" x="360" y="808" width="400" height="58" rx="10"/>
<text class="bt" x="560" y="843" text-anchor="middle">AMP / POWERED SPEAKERS</text>

<line x1="40" y1="902" x2="1560" y2="902" stroke="#333" stroke-width="1"/>

<!-- ===================== PANEL B: MIDI / USB ===================== -->
<text class="panel" x="60" y="948">MIDI  /  USB</text>

<rect class="midi" x="110" y="978" width="240" height="80" rx="10"/>
<text class="bt" x="230" y="1012" text-anchor="middle">MIDI FIGHTER 64</text>
<text class="bs" x="230" y="1034" text-anchor="middle">finger drums + DL4 pads</text>

<rect x="470" y="968" width="720" height="238" rx="14" fill="#11131a" stroke="#888" stroke-dasharray="4 4"/>
<text class="bt" x="492" y="996" text-anchor="start">MAC</text>
<text class="bs" x="1168" y="996" text-anchor="end">audio ⇄ Apollo (Thunderbolt)</text>

<rect class="midi" x="512" y="1008" width="300" height="72" rx="10"/>
<text class="bt" x="662" y="1041" text-anchor="middle">ABLETON</text>
<text class="bs" x="662" y="1063" text-anchor="middle">drum racks · master clock</text>

<rect class="midi" x="512" y="1102" width="300" height="72" rx="10"/>
<text class="bt" x="662" y="1135" text-anchor="middle">DL4 CONDUCTOR app</text>
<text class="bs" x="662" y="1157" text-anchor="middle">looper control · LEDs</text>

<line class="a" x1="350" y1="1012" x2="508" y2="1042" marker-end="url(#arr)"/>
<text class="lbl" x="430" y="1002" text-anchor="middle">drum pads (~48)</text>
<line class="a" x1="350" y1="1038" x2="508" y2="1136" marker-end="url(#arr)"/>
<text class="lbl" x="398" y="1110" text-anchor="middle">DL4 pads (16)</text>

<rect class="midi" x="895" y="1262" width="270" height="60" rx="10"/>
<text class="bt" x="1030" y="1297" text-anchor="middle">POWERED USB HUB</text>

<line class="a" x1="814" y1="1138" x2="1000" y2="1262" marker-end="url(#arr)"/>
<text class="lbl" x="892" y="1182">control + LEDs</text>
<line class="c" x1="814" y1="1044" x2="1015" y2="1260" marker-end="url(#arrc)"/>
<text class="clk" x="1085" y="1135">MIDI clock → delays</text>

<rect class="dl4" x="730" y="1372" width="120" height="52" rx="8"/>
<text class="bt2" x="790" y="1403" text-anchor="middle">DL4 A</text>
<rect class="dl4" x="870" y="1372" width="120" height="52" rx="8"/>
<text class="bt2" x="930" y="1403" text-anchor="middle">DL4 B</text>
<rect class="dl4" x="1010" y="1372" width="120" height="52" rx="8"/>
<text class="bt2" x="1070" y="1403" text-anchor="middle">DL4 C</text>
<rect class="dl4" x="1150" y="1372" width="120" height="52" rx="8"/>
<text class="bt2" x="1210" y="1403" text-anchor="middle">DL4 D</text>

<line class="a" x1="1010" y1="1322" x2="800" y2="1370" marker-end="url(#arr)"/>
<line class="a" x1="1022" y1="1322" x2="935" y2="1370" marker-end="url(#arr)"/>
<line class="a" x1="1038" y1="1322" x2="1065" y2="1370" marker-end="url(#arr)"/>
<line class="a" x1="1050" y1="1322" x2="1205" y2="1370" marker-end="url(#arr)"/>

<text class="bs" x="1000" y="1452" text-anchor="middle">the same 4 DL4s as above  ·  each powered by its own 9V brick</text>
</svg>
