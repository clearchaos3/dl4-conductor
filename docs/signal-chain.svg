<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1340" width="1600" height="1340">
<defs>
  <style>
    text{font-family:Helvetica,Arial,sans-serif}
    .title{font-size:30px;font-weight:bold;fill:#7CF08A}
    .panel{font-size:22px;font-weight:bold;fill:#9fb0a5;letter-spacing:3px}
    .bt{font-size:18px;font-weight:bold;fill:#e8efe9}
    .bt2{font-size:15px;font-weight:bold;fill:#e8efe9}
    .bs{font-size:13px;fill:#9fb0a5}
    .lbl{font-size:13px;fill:#c8d2cc}
    .clk{font-size:13px;fill:#e0a94a}
    .audio{fill:#16211b;stroke:#5bbf73;stroke-width:2}
    .dl4{fill:#16291d;stroke:#7CF08A;stroke-width:2.5}
    .midi{fill:#15212b;stroke:#5aa0e0;stroke-width:2}
    .out{fill:#241a16;stroke:#d98a5b;stroke-width:2}
    .a{stroke:#c8d2cc;stroke-width:2;fill:none}
    .c{stroke:#e0a94a;stroke-width:2;stroke-dasharray:6 5;fill:none}
  </style>
  <marker id="arr" markerUnits="userSpaceOnUse" markerWidth="13" markerHeight="13" refX="10" refY="4.5" orient="auto">
    <path d="M0,0 L11,4.5 L0,9 Z" fill="#c8d2cc"/>
  </marker>
  <marker id="arrc" markerUnits="userSpaceOnUse" markerWidth="13" markerHeight="13" refX="10" refY="4.5" orient="auto">
    <path d="M0,0 L11,4.5 L0,9 Z" fill="#e0a94a"/>
  </marker>
</defs>

<rect x="0" y="0" width="1600" height="1340" fill="#0d0f0e"/>
<text class="title" x="60" y="56">DL4 ×4  ·  Loop + Lofi-Beat Rig — Signal Chain</text>

<!-- Legend -->
<rect x="1170" y="92" width="370" height="150" rx="10" fill="#11141a" stroke="#444"/>
<text class="bt" x="1192" y="122">Legend</text>
<line x1="1192" y1="148" x2="1242" y2="148" stroke="#5bbf73" stroke-width="3"/>
<text class="bs" x="1256" y="153">audio signal</text>
<line x1="1192" y1="180" x2="1242" y2="180" stroke="#5aa0e0" stroke-width="3"/>
<text class="bs" x="1256" y="185">MIDI control</text>
<line x1="1192" y1="212" x2="1242" y2="212" stroke="#e0a94a" stroke-width="3" stroke-dasharray="6 5"/>
<text class="bs" x="1256" y="217">MIDI clock (tempo)</text>

<!-- ===================== PANEL A: AUDIO ===================== -->
<text class="panel" x="60" y="104">AUDIO  PATH   ·   DL4s record samples, FX tweak them live</text>

<rect class="audio" x="60" y="135" width="160" height="52" rx="10"/>
<text class="bt" x="140" y="167" text-anchor="middle">GUITAR</text>
<rect class="audio" x="60" y="205" width="160" height="52" rx="10"/>
<text class="bt" x="140" y="237" text-anchor="middle">MIC</text>

<rect class="audio" x="270" y="135" width="150" height="52" rx="10"/>
<text class="bt" x="345" y="160" text-anchor="middle">TU-3W</text>
<text class="bs" x="345" y="178" text-anchor="middle">tuner</text>

<line class="a" x1="220" y1="161" x2="268" y2="161" marker-end="url(#arr)"/>

<!-- 4 DL4s in series -->
<rect class="dl4" x="270" y="300" width="150" height="74" rx="10"/>
<text class="bt" x="345" y="333" text-anchor="middle">DL4 MkII A</text>
<text class="bs" x="345" y="354" text-anchor="middle">looper</text>
<rect class="dl4" x="470" y="300" width="150" height="74" rx="10"/>
<text class="bt" x="545" y="333" text-anchor="middle">DL4 MkII B</text>
<text class="bs" x="545" y="354" text-anchor="middle">looper</text>
<rect class="dl4" x="670" y="300" width="150" height="74" rx="10"/>
<text class="bt" x="745" y="333" text-anchor="middle">DL4 MkII C</text>
<text class="bs" x="745" y="354" text-anchor="middle">looper</text>
<rect class="dl4" x="870" y="300" width="150" height="74" rx="10"/>
<text class="bt" x="945" y="333" text-anchor="middle">DL4 MkII D</text>
<text class="bs" x="945" y="354" text-anchor="middle">looper</text>

<!-- guitar(1/4") + mic(XLR) into DL4 A -->
<line class="a" x1="345" y1="187" x2="345" y2="298" marker-end="url(#arr)"/>
<text class="lbl" x="352" y="250" text-anchor="start">1/4"</text>
<line class="a" x1="220" y1="231" x2="300" y2="300" marker-end="url(#arr)"/>
<text class="lbl" x="232" y="290" text-anchor="start">XLR (mic)</text>

<!-- series A->B->C->D -->
<line class="a" x1="420" y1="337" x2="468" y2="337" marker-end="url(#arr)"/>
<line class="a" x1="620" y1="337" x2="668" y2="337" marker-end="url(#arr)"/>
<line class="a" x1="820" y1="337" x2="868" y2="337" marker-end="url(#arr)"/>

<text class="bs" x="345" y="406" text-anchor="middle">guitar + mic reach every DL4 → record a sample into any of the four</text>

<!-- DL4 D down into FX -->
<line class="a" x1="945" y1="374" x2="945" y2="446" marker-end="url(#arr)"/>

<rect class="audio" x="270" y="450" width="900" height="92" rx="10"/>
<text class="bt" x="720" y="486" text-anchor="middle">FX CHAIN  ·  after the loopers (tweak live)</text>
<text class="bs" x="720" y="515" text-anchor="middle">MXR Dookie Drive → BOSS GE-7 EQ → EHX Pitch Fork → BOSS PH-2 Phaser → Ibanez DE7 → BOSS DD-5 → BOSS RV-3 Reverb</text>

<text class="lbl" x="1190" y="478" text-anchor="start">↳ Red Remote = DD-5 tap tempo</text>
<text class="lbl" x="1190" y="504" text-anchor="start">↳ Volume X = Pitch Fork expression</text>

<line class="a" x1="720" y1="542" x2="720" y2="576" marker-end="url(#arr)"/>

<rect class="audio" x="520" y="580" width="400" height="70" rx="10"/>
<text class="bt" x="720" y="610" text-anchor="middle">APOLLO TWIN</text>
<text class="bs" x="720" y="632" text-anchor="middle">interface · monitoring · drums in the mix</text>
<text class="bs" x="932" y="620" text-anchor="start">⇄ Mac (Thunderbolt)</text>

<line class="a" x1="720" y1="650" x2="720" y2="684" marker-end="url(#arr)"/>

<rect class="out" x="520" y="688" width="400" height="56" rx="10"/>
<text class="bt" x="720" y="722" text-anchor="middle">AMP / POWERED SPEAKERS</text>

<line x1="40" y1="788" x2="1560" y2="788" stroke="#333" stroke-width="1"/>

<!-- ===================== PANEL B: MIDI / USB ===================== -->
<text class="panel" x="60" y="832">MIDI  /  USB</text>

<rect class="midi" x="80" y="862" width="240" height="80" rx="10"/>
<text class="bt" x="200" y="896" text-anchor="middle">MIDI FIGHTER 64</text>
<text class="bs" x="200" y="918" text-anchor="middle">finger-drum beat + DL4 pads</text>

<rect x="440" y="852" width="720" height="238" rx="14" fill="#11131a" stroke="#888" stroke-dasharray="4 4"/>
<text class="bt" x="462" y="880" text-anchor="start">MAC</text>
<text class="bs" x="1138" y="880" text-anchor="end">audio ⇄ Apollo (Thunderbolt)</text>

<rect class="midi" x="482" y="892" width="300" height="72" rx="10"/>
<text class="bt" x="632" y="925" text-anchor="middle">ABLETON</text>
<text class="bs" x="632" y="947" text-anchor="middle">drum loop · master clock</text>

<rect class="midi" x="482" y="986" width="300" height="72" rx="10"/>
<text class="bt" x="632" y="1019" text-anchor="middle">DL4 CONDUCTOR app</text>
<text class="bs" x="632" y="1041" text-anchor="middle">looper control · quantize · LEDs</text>

<line class="a" x1="320" y1="896" x2="478" y2="926" marker-end="url(#arr)"/>
<text class="lbl" x="400" y="884" text-anchor="middle">drum pads (~48)</text>
<line class="a" x1="320" y1="922" x2="478" y2="1020" marker-end="url(#arr)"/>
<text class="lbl" x="372" y="996" text-anchor="middle">DL4 pads (16)</text>

<rect class="midi" x="865" y="1150" width="270" height="60" rx="10"/>
<text class="bt" x="1000" y="1185" text-anchor="middle">POWERED USB HUB</text>

<line class="a" x1="784" y1="1022" x2="970" y2="1150" marker-end="url(#arr)"/>
<text class="lbl" x="862" y="1066" text-anchor="middle">control + LEDs</text>
<line class="c" x1="784" y1="928" x2="985" y2="1148" marker-end="url(#arrc)"/>
<text class="clk" x="1060" y="1018" text-anchor="middle">MIDI clock → delays</text>

<rect class="dl4" x="700" y="1258" width="120" height="52" rx="8"/>
<text class="bt2" x="760" y="1289" text-anchor="middle">DL4 A</text>
<rect class="dl4" x="840" y="1258" width="120" height="52" rx="8"/>
<text class="bt2" x="900" y="1289" text-anchor="middle">DL4 B</text>
<rect class="dl4" x="980" y="1258" width="120" height="52" rx="8"/>
<text class="bt2" x="1040" y="1289" text-anchor="middle">DL4 C</text>
<rect class="dl4" x="1120" y="1258" width="120" height="52" rx="8"/>
<text class="bt2" x="1180" y="1289" text-anchor="middle">DL4 D</text>

<line class="a" x1="980" y1="1210" x2="770" y2="1256" marker-end="url(#arr)"/>
<line class="a" x1="992" y1="1210" x2="905" y2="1256" marker-end="url(#arr)"/>
<line class="a" x1="1008" y1="1210" x2="1035" y2="1256" marker-end="url(#arr)"/>
<line class="a" x1="1020" y1="1210" x2="1175" y2="1256" marker-end="url(#arr)"/>

<text class="bs" x="970" y="1335" text-anchor="middle">the same 4 DL4s as above  ·  each powered by its own 9V brick</text>
</svg>
